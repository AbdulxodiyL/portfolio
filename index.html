<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Abdulxodiy
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #6c63ff;
      --secondary: #00d4ff;
      --accent: #ff6584;
      --dark: #0a0a0f;
      --dark2: #111118;
      --card: rgba(255,255,255,0.04);
      --text: #e0e0f0;
      --muted: #8888aa;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ─── CANVAS ─── */
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 60px;
      backdrop-filter: blur(20px);
      background: rgba(10,10,15,0.7);
      border-bottom: 1px solid rgba(108,99,255,0.15);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 36px;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.3s;
      letter-spacing: 0.3px;
    }

    nav a:hover { color: var(--secondary); }

    /* ─── SECTIONS ─── */
    section {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 60px;
    }

    /* ─── HERO ─── */
    #hero {
      flex-direction: column;
      text-align: center;
      gap: 24px;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.4);
      color: var(--primary);
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      animation: fadeDown 0.8s ease both;
    }

    .hero-title {
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -2px;
      animation: fadeUp 0.9s ease 0.1s both;
    }

    .hero-title .gradient {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-sub {
      font-size: 1.15rem;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.7;
      animation: fadeUp 0.9s ease 0.2s both;
    }

    .hero-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      animation: fadeUp 0.9s ease 0.3s both;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      box-shadow: 0 8px 32px rgba(108,99,255,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(108,99,255,0.5);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1.5px solid rgba(255,255,255,0.15);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-3px);
    }

    .scroll-indicator {
      animation: bounce 2s infinite, fadeUp 1s ease 1s both;
      color: var(--muted);
      font-size: 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .scroll-indicator::after {
      content: '';
      width: 1.5px;
      height: 40px;
      background: linear-gradient(to bottom, var(--primary), transparent);
      display: block;
    }

    /* ─── ABOUT ─── */
    #about { gap: 80px; }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      max-width: 1100px;
    }

    .section-tag {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .section-text {
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    /* 3D Card */
    .card-3d-wrapper {
      perspective: 1000px;
    }

    .card-3d {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 40px;
      transform-style: preserve-3d;
      transition: transform 0.1s ease;
      position: relative;
      overflow: hidden;
    }

    .card-3d::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(108,99,255,0.1), rgba(0,212,255,0.05));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card-3d:hover::before { opacity: 1; }

    .avatar-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin: 0 auto 24px;
      box-shadow: 0 0 40px rgba(108,99,255,0.4);
      animation: spin-slow 8s linear infinite;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 28px;
    }

    .stat {
      text-align: center;
      padding: 16px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .stat-num {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ─── SKILLS ─── */
    #skills { flex-direction: column; gap: 60px; }

    .skills-header { text-align: center; }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      max-width: 1000px;
      width: 100%;
    }

    .skill-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 32px 20px;
      text-align: center;
      cursor: default;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }

    .skill-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--skill-color, var(--primary));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .skill-card:hover {
      transform: translateY(-12px) rotateX(5deg);
      border-color: rgba(108,99,255,0.3);
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .skill-card:hover::after { transform: scaleX(1); }

    .skill-icon {
      font-size: 2.8rem;
      margin-bottom: 12px;
      display: block;
    }

    .skill-name {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .skill-bar {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 10px;
    }

    .skill-fill {
      height: 100%;
      background: var(--skill-color, var(--primary));
      border-radius: 99px;
      width: 0%;
      transition: width 1.5s ease;
    }

    /* ─── PROJECTS ─── */
    #projects { flex-direction: column; gap: 60px; }

    .projects-header { text-align: center; }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      max-width: 1100px;
      width: 100%;
    }

    .project-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      overflow: hidden;
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .project-card:hover {
      transform: translateY(-10px);
      border-color: rgba(108,99,255,0.3);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .project-img {
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      position: relative;
      overflow: hidden;
    }

    .project-img::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.9;
    }

    .project-body { padding: 28px; }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 50px;
      letter-spacing: 0.5px;
    }

    .project-name {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .project-desc {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .project-links {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .project-link {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.3s;
    }

    .project-link:hover { color: var(--secondary); }

    /* ─── CONTACT ─── */
    #contact { flex-direction: column; gap: 50px; text-align: center; }

    .contact-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 32px;
      padding: 70px 60px;
      max-width: 700px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .contact-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at center, rgba(108,99,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .contact-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 36px;
      flex-wrap: wrap;
    }

    .contact-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1.5px solid rgba(255,255,255,0.1);
      color: var(--text);
    }

    .contact-btn:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 12px 32px rgba(108,99,255,0.25);
    }

    /* ─── FOOTER ─── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 30px;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-20px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(30px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── CURSOR GLOW ─── */
    .cursor-glow {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%,-50%);
      transition: left 0.15s ease, top 0.15s ease;
    }

    /* Mobile */
    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      nav ul { gap: 20px; }
      section { padding: 100px 24px; }
      .about-grid { grid-template-columns: 1fr; gap: 40px; }
      .contact-card { padding: 40px 24px; }
    }
  </style>
</head>

      <a href="mailto:email@gmail.com" class="contact-btn">
        <span>📧</span> Email
      </a>
      <a href="https://github.com/username" class="contact-btn">
        <span>🐙</span> GitHub
      </a>
      <a href="https://linkedin.com" class="contact-btn">
        <span>💼</span> LinkedIn
      </a>
    </div>
  </div>
</section>

<footer>
  <p>© 2025 · Abdulxodiy · Andijon, O'zbekiston 🇺🇿</p>
</footer>

<script>
// ── THREE.JS PARTICLE BACKGROUND ──
const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 60;

// Particles
const geo = new THREE.BufferGeometry();
const COUNT = 2000;
const positions = new Float32Array(COUNT * 3);
const colors = new Float32Array(COUNT * 3);

const palette = [
  new THREE.Color(0x6c63ff),
  new THREE.Color(0x00d4ff),
  new THREE.Color(0xff6584),
];

for (let i = 0; i < COUNT; i++) {
  positions[i*3]   = (Math.random() - 0.5) * 200;
  positions[i*3+1] = (Math.random() - 0.5) * 200;
  positions[i*3+2] = (Math.random() - 0.5) * 200;
  const c = palette[Math.floor(Math.random() * palette.length)];
  colors[i*3]   = c.r;
  colors[i*3+1] = c.g;
  colors[i*3+2] = c.b;
}

geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const mat = new THREE.PointsMaterial({
  size: 0.4,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  sizeAttenuation: true,
});

const points = new THREE.Points(geo, mat);
scene.add(points);

// Lines (constellation)
const lineMat = new THREE.LineBasicMaterial({
  color: 0x6c63ff,
  transparent: true,
  opacity: 0.06,
});

for (let i = 0; i < 60; i++) {
  const lineGeo = new THREE.BufferGeometry();
  const pts = [
    new THREE.Vector3((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200),
    new THREE.Vector3((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200),
  ];
  lineGeo.setFromPoints(pts);
  scene.add(new THREE.Line(lineGeo, lineMat));
}

let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth  - 0.5) * 0.3;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 0.3;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

(function animate() {
  requestAnimationFrame(animate);
  const t = Date.now() * 0.0002;
  points.rotation.y = t * 0.4 + mouseX;
  points.rotation.x = t * 0.15 + mouseY;
  renderer.render(scene, camera);
})();

// ── CURSOR GLOW ──
const glow = document.getElementById('cursor-glow');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top  = e.clientY + 'px';
});

// ── 3D CARD TILT ──
const wrapper = document.getElementById('about-card-wrapper');
const card    = document.getElementById('about-card');

wrapper.addEventListener('mousemove', e => {
  const rect = wrapper.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width  - 0.5;
  const y = (e.clientY - rect.top)  / rect.height - 0.5;
  card.style.transform = `rotateY(${x * 20}deg) rotateX(${-y * 20}deg)`;
});

wrapper.addEventListener('mouseleave', () => {
  card.style.transform = 'rotateY(0deg) rotateX(0deg)';
  card.style.transition = 'transform 0.5s ease';
});

// ── SCROLL REVEAL ──
const revealEls = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      setTimeout(() => {
        entry.target.classList.add('visible');
        // Skill bars
        const fill = entry.target.querySelector('.skill-fill');
        if (fill) {
          fill.style.width = fill.dataset.width + '%';
        }
      }, i * 80);
    }
  });
}, { threshold: 0.1 });

revealEls.forEach(el => observer.observe(el));

// ── ACTIVE NAV ──
const sections = document.querySelectorAll('section');
const navLinks = document.querySelectorAll('nav a');

window.addEventListener('scroll', () => {
  let current = '';
  sections.forEach(s => {
    if (window.scrollY >= s.offsetTop - 200) current = s.id;
  });
  navLinks.forEach(a => {
    a.style.color = a.getAttribute('href') === '#' + current
      ? 'var(--secondary)' : '';
  });
});
</script>
</body>
</html>
